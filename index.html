<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Project Manager</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#FFE5D9; /* Melon */
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#333;
    font-size:40px;
}

.header p{
    color:#555;
    margin-top:10px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
    color:#FF7F50; /* Coral */
}

.project-form{
    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:30px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.project-form h2{
    margin-bottom:15px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    background:#FF7F50; /* Coral */
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.project-card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.project-card h3{
    color:#FF7F50;
}

.project-card p{
    margin:10px 0;
}

.details-btn{
    margin-top:10px;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.modal-content{
    background:white;
    width:80%;
    max-width:600px;
    margin:80px auto;
    padding:25px;
    border-radius:15px;
}

.close{
    float:right;
    font-size:25px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Portfolio Project Manager</h1>
<p>Manage and showcase your academic projects professionally.</p>
</div>

<div class="dashboard">
<div class="card">
<h2>12</h2>
<p>Total Projects</p>
</div>

<div class="card">
<h2>8</h2>
<p>Completed</p>
</div>

<div class="card">
<h2>4</h2>
<p>In Progress</p>
</div>
</div>

<div class="project-form">
<h2>Add New Project</h2>

<input type="text" id="title" placeholder="Project Title">

<input type="text" id="tech" placeholder="Technology Used">

<textarea id="desc" rows="4" placeholder="Project Description"></textarea>

<button onclick="addProject()">Add Project</button>
</div>

<div class="projects" id="projectContainer">

<div class="project-card">
<h3>Travel Bucket List Map</h3>
<p>Interactive travel tracking system.</p>
<button class="details-btn"
onclick="showDetails(
'Travel Bucket List Map',
'HTML, CSS, JavaScript',
'Allows users to track dream destinations and completed trips.'
)">
View Details
</button>
</div>

<div class="project-card">
<h3>Book Progress Tracker</h3>
<p>Monitor reading progress.</p>
<button class="details-btn"
onclick="showDetails(
'Book Progress Tracker',
'HTML, CSS',
'Track books, pages read and reading goals.'
)">
View Details
</button>
</div>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>

<h2 id="mTitle"></h2>
<p><strong>Technology:</strong> <span id="mTech"></span></p>
<p id="mDesc"></p>

</div>
</div>

<script>

function showDetails(title,tech,desc){
document.getElementById("modal").style.display="block";
document.getElementById("mTitle").innerText=title;
document.getElementById("mTech").innerText=tech;
document.getElementById("mDesc").innerText=desc;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function addProject(){

let title=document.getElementById("title").value;
let tech=document.getElementById("tech").value;
let desc=document.getElementById("desc").value;

if(title=="" || tech=="" || desc==""){
alert("Please fill all fields");
return;
}

let card=document.createElement("div");
card.className="project-card";

card.innerHTML=`
<h3>${title}</h3>
<p>${desc.substring(0,50)}...</p>
<button class="details-btn"
onclick="showDetails('${title}','${tech}','${desc}')">
View Details
</button>
`;

document.getElementById("projectContainer").appendChild(card);

document.getElementById("title").value="";
document.getElementById("tech").value="";
document.getElementById("desc").value="";
}
</script>

</body>
</html>
